                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (err) {
                            console.error("認證失敗", err);
                            setLoading(false);
                        }
                    };
                    initAuth();
                    
                    const unsubscribe = onAuthStateChanged(auth, async (u) => {
                        setUser(u);
                        if (u && db) {
                            try {
                                const weightDocRef = doc(db, getSettingsPath(), 'weights');
                                const weightSnap = await executeWithTimeout(getDoc(weightDocRef));
                                if (weightSnap.exists()) {
                                    setScoringWeights(weightSnap.data());
                                }
                            } catch (error) {
                                console.error("無法拉取轉換權重", error);
                            }
                        }
                        setLoading(false);
                    });
                    return () => unsubscribe();
                }, []);

                    if (viewMode === 'manager' && user && db) {

                        setManagerSearchQuery('');
                        setExpandedTeacherId(null);

                            setLoading(true);
                            try {
                                const colRef = collection(db, getCollectionPath());

                                snapshot.forEach(docSnap => {
                                    dataList.push({ id: docSnap.id, ...docSnap.data() });
                                });
                                dataList.sort((a, b) => a.id.localeCompare(b.id));

                    try {
                        const docPath = `${getCollectionPath()}/${searchInput.trim()}`;
                        const docRef = doc(db, docPath);
                        const docSnap = await executeWithTimeout(getDoc(docRef));

                        if (docSnap.exists()) {
                            setTeacherData(docSnap.data());
                            setCurrentCardNumber(searchInput.trim());
                            showToast('資料載入成功');
                        } else {
                            setTeacherData(null);
                            setCurrentCardNumber(searchInput.trim());
                            setIsCreating(true);
                            setNewName('');
                            setNewTitle('');
                        }
                    } catch (error) {
                        console.error("Error fetching document:", error);
                        if (error.message === "FIREBASE_TIMEOUT") {
                            showToast('連線逾時！請確認已在 Firebase 後台建立「Firestore Database」', 'error', 5000);
                        } else {
                            showToast('查詢失敗，請檢查資料庫權限', 'error');
                        }
                    } finally {
                        setLoading(false);
                    }
                };

                const handleCreateTeacher = async (e) => {
                    e.preventDefault();
                    if (!newName.trim() || !newTitle.trim()) {
                        showToast('請填寫姓名與職稱', 'error');
                        return;
                    }

                    const initialData = {
                        name: newName.trim(),
                        title: newTitle.trim(),
                        scores: {},
                        createdAt: new Date().toISOString()
                    };

                    setLoading(true);
                    try {
                        const docPath = `${getCollectionPath()}/${currentCardNumber}`;
                        const docRef = doc(db, docPath);
                        await executeWithTimeout(setDoc(docRef, initialData));
                        setTeacherData(initialData);
                        setIsCreating(false);
                        showToast('人員建立成功！');
                    } catch (error) {
                        if (error.message === "FIREBASE_TIMEOUT") {
                            showToast('建立失敗：連線逾時，請確認 Firestore Database 是否已開通。', 'error', 5000);
                        } else {
                            showToast('建立失敗', 'error');
                        }
                    } finally {
                        setLoading(false);
                    }
                };

                const handleSaveProfile = async () => {
                    if (!editName.trim() || !editTitle.trim()) {
                        showToast('姓名與職稱不可為空', 'error');
                        return;
                    }
                    
                    setLoading(true);
                    try {
                        const docPath = `${getCollectionPath()}/${currentCardNumber}`;
                        const docRef = doc(db, docPath);
                        
                        await executeWithTimeout(setDoc(docRef, {
                            name: editName.trim(),
                            title: editTitle.trim()
                        }, { merge: true }));
                        
                        setTeacherData(prev => ({
                            ...prev,
                            name: editName.trim(),
                            title: editTitle.trim()
                        }));
                        setIsEditingProfile(false);
                        showToast('基本資料修改成功！');
                    } catch (error) {
                        if (error.message === "FIREBASE_TIMEOUT") {
                            showToast('修改失敗：連線逾時', 'error', 5000);
                        } else {
                            showToast('修改失敗', 'error');
                        }
                    } finally {
                        setLoading(false);
                    }
                };

                const handleScoreChange = (key, value) => {
                    const numValue = value === '' ? 0 : parseFloat(value);
                    setTeacherData(prev => ({
                        ...prev,
                        scores: {
                            ...prev.scores,
                            [key]: numValue
                        }
                    }));
                };

                const handleSaveScores = async () => {
                    if (!currentCardNumber || !teacherData || !db) return;
                    setLoading(true);
                    try {
                        const docPath = `${getCollectionPath()}/${currentCardNumber}`;
                        const docRef = doc(db, docPath);
                        await executeWithTimeout(setDoc(docRef, { scores: teacherData.scores }, { merge: true }));
                        showToast('分數儲存成功！');
                    } catch (error) {
                        if (error.message === "FIREBASE_TIMEOUT") {
                            showToast('儲存失敗：連線逾時，請確認 Firestore Database 是否已開通。', 'error', 5000);
                        } else {
                            showToast('儲存失敗', 'error');
                        }
                    } finally {
                        setLoading(false);
                    }
                };

                const handleBatchImport = async () => {
                    if (!importText.trim() || !user || !db) return;
                    setIsImporting(true);
                    
                    const rows = importText.trim().split('\n');
                    let successCount = 0;
                    let failCount = 0;
                    let isTimeout = false;

                    for (const row of rows) {
                        if (isTimeout) break;

                        const cols = row.split(/[\t,]/).map(c => c.trim());
                        if (cols.length >= 2) {
                            const cardNum = cols[0];
                            const name = cols[1];
                            const title = cols[2] || '無職稱';
                            
                            if (cardNum && name) {
                                try {
                                    const docPath = `${getCollectionPath()}/${cardNum}`;
                                    const docRef = doc(db, docPath);
                                    await executeWithTimeout(
                                        setDoc(docRef, {
                                            name: name,
                                            title: title,
                                            createdAt: new Date().toISOString()
                                        }, { merge: true })
                                    );
                                    successCount++;
                                } catch (e) {
                                    if (e.message === "FIREBASE_TIMEOUT") {
                                        isTimeout = true;
                                    } else {
                                        failCount++;
                                    }
                                }
                            }
                        }
                    }

                    setIsImporting(false);
                    
                    if (isTimeout) {
                        setShowImportModal(false);
                        showToast(`匯入中斷：連線逾時！請前往 Firebase 控制台建立「Firestore Database」！`, 'error', 8000);
                    } else {
                        setShowImportModal(false);
                        setImportText('');
                        if (successCount > 0) {
                            showToast(`匯入完成！成功: ${successCount} 筆，失敗: ${failCount} 筆`);
                        } else {
                            showToast(`匯入失敗，請確認資料格式。`, 'error');
                        }
                    }
                };

                const openWeightModal = () => {
                    setTempWeights({ ...scoringWeights });
                    setShowWeightModal(true);
                };

                const handleTempWeightChange = (key, value) => {
                    const numValue = value === '' ? 0 : parseFloat(value);
                    setTempWeights(prev => ({
                        ...prev,
                        [key]: numValue
                    }));
                };

                const handleSaveWeights = async () => {
                    setLoading(true);
                    try {
                        const weightDocRef = doc(db, getSettingsPath(), 'weights');
                        await executeWithTimeout(setDoc(weightDocRef, tempWeights));
                        setScoringWeights(tempWeights);
                        setShowWeightModal(false);
                        showToast('轉換標準設定已成功更新！');
                    } catch (error) {
                        console.error("更新轉換權重失敗:", error);
                        showToast('更新失敗，請檢查連線狀態', 'error');
                    } finally {
                        setLoading(false);
                    }
                };

                const getWeight = (key) => {
                    return scoringWeights[key] !== undefined ? scoringWeights[key] : 1;
                };

                // --- 總覽計算邏輯 ---
                const getTeacherCategoryTotal = (teacher, catId) => {
                    if (!teacher || !teacher.scores) return 0;
                    const items = SCORING_CATEGORIES[catId].sections.flatMap(s => s.items);
                    let total = 0;
                    items.forEach(item => {
                        const raw = teacher.scores[item.key] || 0;
                        total += raw * getWeight(item.key);
                    });
                    return total;
                };

                const getTeacherGrandTotal = (teacher) => {
                    return Object.keys(SCORING_CATEGORIES).reduce((acc, catId) => acc + getTeacherCategoryTotal(teacher, catId), 0);
                };

                // --- 總覽列表過濾邏輯 (雙重過濾：防呆處理 name 與 id 為空的情況) ---
                const managerDisplayList = allTeachers.filter(teacher => {
                    const matchGroup = selectedGroup === '全部' || (teacher.title || '未分類') === selectedGroup;
                    const query = managerSearchQuery.toLowerCase();
                    const matchSearch = query === '' || 
                                        (teacher.id || '').toLowerCase().includes(query) || 
                                        (teacher.name || '').toLowerCase().includes(query);
                    return matchGroup && matchSearch;
                });

                // 將過濾後的名單重新依據「職稱」分組，以渲染標題列
                const groupedFilteredTeachers = managerDisplayList.reduce((acc, curr) => {
                    const titleKey = curr.title || '未分類';
                    if (!acc[titleKey]) acc[titleKey] = [];
                    acc[titleKey].push(curr);
                    return acc;
                }, {});
                
                // 供畫面遍歷的分組陣列
                const filteredGroups = Object.entries(groupedFilteredTeachers).sort(([a], [b]) => a.localeCompare(b));
                const displayedTeachersCount = managerDisplayList.length;

                // 為了產生「所有存在的職稱過濾按鈕」，需要基於未被關鍵字過濾的原始資料分組
                const baseTitleGroups = allTeachers.reduce((acc, curr) => {
                    const titleKey = curr.title || '未分類';
                    acc[titleKey] = true;
                    return acc;
                }, {});

                // 計算當前顯示列表的平均總分
                const getCategoryAverageTotal = (catId) => {
                    if (managerDisplayList.length === 0) return 0;
                    const sum = managerDisplayList.reduce((acc, curr) => acc + getTeacherCategoryTotal(curr, catId), 0);
                    return sum / managerDisplayList.length;
                };

                const getGrandAverageTotal = () => {
                    if (managerDisplayList.length === 0) return 0;
                    const sum = managerDisplayList.reduce((acc, curr) => acc + getTeacherGrandTotal(curr), 0);
                    return sum / managerDisplayList.length;
                };


                if (!isValidConfig) {
                    return (
                        <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-slate-600">
                            <IconAlertCircle className="w-16 h-16 text-red-400 mb-4" />
                            <div className="text-2xl font-bold mb-2">系統尚未連線至資料庫</div>
                            <div className="text-sm text-center max-w-md mt-2">
                                請打開原始碼，在「firebaseConfig」區塊填寫您的專屬設定。<br/>
                                <span className="text-gray-400 text-xs mt-2 block">若您已填寫但仍看到此畫面，請檢查格式是否正確。</span>
                            </div>
                        </div>
                    );
                }

                if (loading && !user) {
                    return <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-gray-500">
                        <div className="mb-4 text-lg flex items-center gap-2">
                            <div className="w-5 h-5 border-2 border-gray-400 border-t-blue-600 rounded-full animate-spin"></div>
                            系統初始化中...
                        </div>
                    </div>;
                }

                const currentItems = SCORING_CATEGORIES[activeTab].sections.flatMap(s => s.items);

                return (
                    <div>
                        {/* 頂部導覽列 */}
                        <div className="bg-white shadow-sm sticky top-0 z-10">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                                <div className="flex flex-col lg:flex-row items-center justify-between gap-4">
                                    <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <IconAward className="text-blue-600 flex-shrink-0" />
                                        績效評分系統
                                    </h1>
                                    
                                    <div className="flex items-center flex-wrap justify-center gap-2 w-full lg:w-auto">
                                        {viewMode === 'single' ? (
                                            <>
                                                <button
                                                    onClick={() => setViewMode('manager')}
                                                    className="flex items-center gap-1 text-sm bg-blue-50 text-blue-700 px-3 py-2 rounded-lg hover:bg-blue-100 transition-colors font-bold border border-blue-200"
                                                >
                                                    <IconTable className="w-4 h-4" />
                                                    <span className="hidden sm:inline">主管總覽</span>
                                                </button>

                                                <button
                                                    onClick={() => setShowImportModal(true)}
                                                    className="flex items-center gap-1 text-sm bg-slate-100 text-slate-600 px-3 py-2 rounded-lg hover:bg-slate-200 transition-colors font-medium border border-slate-200"
                                                >
                                                    <IconUpload className="w-4 h-4" />
                                                    <span className="hidden lg:inline">批次匯入</span>
                                                </button>

                                                <form onSubmit={handleSearch} className="flex flex-grow sm:flex-grow-0">
                                                    <div className="relative flex-grow sm:w-64">
                                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                            <IconSearch className="h-4 w-4 text-gray-400" />
                                                        </div>
                                                        <input
                                                            type="text"
                                                            placeholder="輸入卡號查詢..."
                                                            value={searchInput}
                                                            onChange={(e) => setSearchInput(e.target.value)}
                                                            className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-l-lg focus:ring-blue-500 focus:border-blue-500 text-sm"
                                                        />
                                                    </div>
                                                    <button
                                                        type="submit"
                                                        disabled={loading}
                                                        className="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 text-sm font-medium transition-colors disabled:bg-blue-400"
                                                    >
                                                        查詢
                                                    </button>
                                                </form>
                                            </>
                                        ) : (
                                            <>
                                                <button
                                                    onClick={openWeightModal}
                                                    className="flex items-center gap-1 text-sm bg-amber-50 text-amber-700 px-3 py-2 rounded-lg hover:bg-amber-100 transition-colors font-bold border border-amber-200"
                                                >
                                                    <IconSettings className="w-4 h-4" />
                                                    <span className="hidden sm:inline">設定轉換標準</span>
                                                </button>

                                                <button
                                                    onClick={() => setViewMode('single')}
                                                    className="flex items-center gap-2 text-sm bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors font-medium ml-auto"
                                                >
                                                    <IconArrowLeft className="w-4 h-4" />
                                                    返回單人評分
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 轉換標準設定 Modal */}
                        {showWeightModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
                                <div className="bg-white rounded-xl shadow-xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh]">
                                    <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-amber-50">
                                        <h3 className="text-lg font-bold text-amber-800 flex items-center gap-2">
                                            <IconSettings className="w-5 h-5" />
                                            各項目轉換分數標準設定
                                        </h3>
                                        <button onClick={() => setShowWeightModal(false)} className="text-amber-600 hover:text-amber-800 bg-amber-100/50 p-1 rounded-full">
                                            <IconX className="w-5 h-5" />
                                        </button>
                                    </div>
                                    
                                    <div className="p-6 overflow-y-auto bg-slate-50 space-y-6">
                                        <div className="text-sm text-amber-700 bg-amber-100/50 p-3 rounded-lg border border-amber-200/60 font-medium">
                                            💡 說明：在此設定各項目的「乘數權重」。例如：若設定為 5，則當老師取得 2 張證書時，系統會自動換算為 10 分 (2×5=10)。若不需換算，保留 1 即可。
                                        </div>

                                        {Object.values(SCORING_CATEGORIES).map(cat => (
                                            <div key={cat.id} className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
                                                <h4 className="text-md font-bold text-blue-800 mb-4 flex items-center gap-2 border-b border-blue-100 pb-2">
                                                    {cat.icon} {cat.title}
                                                </h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                                    {cat.sections.map(section => (
                                                        <div key={section.title} className="space-y-2">
                                                            <div className="text-xs font-bold text-slate-400 uppercase tracking-wider">{section.title}</div>
                                                            {section.items.map(item => (
                                                                <div key={item.key} className="flex items-center justify-between gap-3 bg-slate-50 p-2 rounded border border-slate-100">
                                                                    <div className="text-sm text-slate-700 flex-grow font-medium truncate" title={item.label}>
                                                                        {item.label} <span className="text-xs text-slate-400 font-normal">({item.unit})</span>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-slate-400 text-sm">×</span>
                                                                        <input
                                                                            type="number"
                                                                            step="0.1"
                                                                            value={tempWeights[item.key] !== undefined ? tempWeights[item.key] : 1}
                                                                            onChange={(e) => handleTempWeightChange(item.key, e.target.value)}
                                                                            className="w-16 text-center border border-amber-300 bg-amber-50 text-amber-900 rounded py-1 px-1 text-sm font-bold focus:ring-2 focus:ring-amber-500 outline-none"
                                                                        />
                                                                        <span className="text-slate-500 text-sm font-medium w-4">分</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="px-6 py-4 border-t border-slate-100 bg-white flex justify-end gap-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                        <button onClick={() => setShowWeightModal(false)} className="px-5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">取消變更</button>
                                        <button onClick={handleSaveWeights} disabled={loading} className="bg-amber-600 text-white px-6 py-2 rounded-lg hover:bg-amber-700 transition-colors text-sm font-bold shadow-sm flex items-center gap-2">
                                            <IconSave className="w-4 h-4" /> 儲存轉換標準
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 批次匯入 Modal */}
                        {showImportModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
                                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                    <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <IconUpload className="w-5 h-5 text-blue-600" />
                                            大量匯入教職員資料
                                        </h3>
                                        <button onClick={() => !isImporting && setShowImportModal(false)} className="text-slate-400 hover:text-slate-600">
                                            <IconX className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="p-6 overflow-y-auto">
                                        <div className="mb-4 text-sm text-slate-600 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                            <p className="font-semibold text-blue-800 mb-1">使用方式：</p>
                                            <ul className="list-disc pl-5 space-y-1">
                                                <li>請直接從 Excel 中複製多列資料並貼上至下方。</li>
                                                <li>欄位順序必須為：<strong>卡號、姓名、職稱</strong>。</li>
                                                <li>若資料庫已存在該卡號，原有的績效評分<strong>將會保留</strong>，僅更新姓名與職稱。</li>
                                            </ul>
                                        </div>
                                        <textarea
                                            value={importText}
                                            onChange={(e) => setImportText(e.target.value)}
                                            placeholder="貼上範例：&#10;T001&#9;王小明&#9;主任&#10;T002&#9;李大華&#9;組長&#10;T003&#9;陳小美&#9;導師"
                                            className="w-full h-48 border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none font-mono"
                                            disabled={isImporting}
                                        ></textarea>
                                    </div>
                                    <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                        <button
                                            onClick={() => setShowImportModal(false)}
                                            disabled={isImporting}
                                            className="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 transition-colors"
                                        >
                                            取消
                                        </button>
                                        <button
                                            onClick={handleBatchImport}
                                            disabled={isImporting || !importText.trim()}
                                            className="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium disabled:bg-blue-400 flex items-center gap-2"
                                        >
                                            {isImporting ? '匯入處理中...' : '開始匯入'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 全域 Toast 提示 */}
                        {toast && (
                            <div className={`fixed top-20 right-4 p-4 rounded-lg shadow-lg flex items-center gap-2 text-white z-50 transition-opacity ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}>
                                {toast.type === 'error' ? <IconAlertCircle className="w-5 h-5" /> : <IconCheckCircle className="w-5 h-5" />}
                                {toast.message}
                            </div>
                        )}

                        {/* 主畫面區域：根據 viewMode 切換 */}
                        <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            
                            {/* ===================================================================== */}
                            {/* 視角 B：主管總覽 (Manager View) */}
                            {/* ===================================================================== */}
                            {viewMode === 'manager' && (
                                <div className="space-y-4 animate-in fade-in duration-300">
                                    
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                        
                                        {/* 總覽上方的過濾與搜尋列 */}
                                        <div className="px-5 py-4 bg-white border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                            {/* 左側：職稱篩選 */}
                                            <div className="flex flex-wrap gap-2 items-center">
                                                <IconFilter className="w-4 h-4 text-slate-400 mr-1" />
                                                <span className="text-sm font-semibold text-slate-600 mr-2">職稱篩選：</span>
                                                <button
                                                    onClick={() => setSelectedGroup('全部')}
                                                    className={`px-3 py-1.5 text-sm rounded-full transition-colors ${
                                                        selectedGroup === '全部' ? 'bg-slate-700 text-white font-medium shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                                    }`}
                                                >
                                                    全體人員
                                                </button>
                                                {Object.keys(baseTitleGroups).sort().map(title => (
                                                    <button
                                                        key={title}
                                                        onClick={() => setSelectedGroup(title)}
                                                        className={`px-3 py-1.5 text-sm rounded-full transition-colors ${
                                                            selectedGroup === title ? 'bg-blue-600 text-white font-medium shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                                        }`}
                                                    >
                                                        {title}
                                                    </button>
                                                ))}
                                            </div>
                                            
                                            {/* 右側：關鍵字搜尋 */}
                                            <div className="relative w-full md:w-72">
                                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                    <IconSearch className="h-4 w-4 text-slate-400" />
                                                </div>
                                                <input
                                                    type="text"
                                                    placeholder="搜尋卡號或姓名..."
                                                    value={managerSearchQuery}
                                                    onChange={(e) => setManagerSearchQuery(e.target.value)}
                                                    className="block w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors"
                                                />
                                                {managerSearchQuery && (
                                                    <button 
                                                        onClick={() => setManagerSearchQuery('')}
                                                        className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600"
                                                    >
                                                        <IconX className="h-4 w-4" />
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        <div className="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50 px-5">
                                            <p className="text-sm text-slate-500">
                                                💡 <span className="font-semibold text-blue-600">點擊人員資料列</span>，即可展開查看該人員各項目的詳細分數紀錄。
                                            </p>
                                            <span className="text-sm font-bold text-slate-600 bg-white px-3 py-1 rounded border border-slate-200 shadow-sm">
                                                共找到 {displayedTeachersCount} 筆資料
                                            </span>
                                        </div>

                                        {/* 為資料表外層加入固定高度與捲動軸，實現凍結窗格效果 */}
                                        <div className="overflow-auto max-h-[70vh]">
                                            <table className="min-w-full text-sm border-collapse">
                                                <thead className="bg-slate-100 text-slate-600 sticky top-0 z-20 shadow-sm outline outline-1 outline-slate-200">
                                                    <tr>
                                                        <th className="px-4 py-3 text-left font-semibold whitespace-nowrap align-middle border-b border-slate-200">卡號</th>
                                                        <th className="px-4 py-3 text-left font-semibold whitespace-nowrap align-middle border-b border-slate-200">姓名</th>
                                                        <th className="px-4 py-3 text-left font-semibold whitespace-nowrap align-middle border-b border-slate-200 border-r">職稱</th>
                                                        {Object.values(SCORING_CATEGORIES).map(cat => (
                                                            <th key={cat.id} className="px-3 py-3 text-center font-semibold whitespace-nowrap min-w-[100px] border-b border-slate-200">
                                                                <div className="flex flex-col items-center">
                                                                    <span>{cat.title}</span>
                                                                    <span className="text-[11px] text-slate-400 font-normal">(總分)</span>
                                                                </div>
                                                            </th>
                                                        ))}
                                                        <th className="px-4 py-3 text-center font-bold text-blue-700 whitespace-nowrap bg-blue-50/50 border-b border-slate-200 border-l">
                                                            <div className="flex flex-col items-center">
                                                                <span>個人總計</span>
                                                            </div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white">
                                                    {loading ? (
                                                        <tr><td colSpan={Object.keys(SCORING_CATEGORIES).length + 4} className="px-4 py-8 text-center text-slate-500">載入中...</td></tr>
                                                    ) : displayedTeachersCount === 0 ? (
                                                        <tr><td colSpan={Object.keys(SCORING_CATEGORIES).length + 4} className="px-4 py-8 text-center text-slate-500">找不到符合條件的人員資料。</td></tr>
                                                    ) : (
                                                        // 渲染被過濾後的資料群組
                                                        filteredGroups.map(([groupTitle, teachersInGroup]) => (
                                                            <Fragment key={groupTitle}>
                                                                {/* 職稱群組標題列 */}
                                                                <tr className="bg-slate-100/80 border-b border-slate-200">
                                                                    <td colSpan={Object.keys(SCORING_CATEGORIES).length + 4} className="px-4 py-2 font-bold text-slate-700 text-left shadow-[inset_0_1px_0_rgba(0,0,0,0.02)]">
                                                                        【{groupTitle}】 <span className="text-xs text-slate-500 font-normal ml-2">此類別共 {teachersInGroup.length} 人</span>
                                                                    </td>
                                                                </tr>
                                                                {/* 該群組內的人員名單 */}
                                                                {teachersInGroup.map(teacher => {
                                                                    const isExpanded = expandedTeacherId === teacher.id;
                                                                    const teacherGrandTotal = getTeacherGrandTotal(teacher);
                                                                    
                                                                    return (
                                                                        <Fragment key={teacher.id}>
                                                                            {/* 點擊展開的觸發列 */}
                                                                            <tr 
                                                                                onClick={() => setExpandedTeacherId(isExpanded ? null : teacher.id)}
                                                                                className={`cursor-pointer transition-colors border-b border-slate-100 ${isExpanded ? 'bg-blue-50/60' : 'hover:bg-slate-50'}`}
                                                                            >
                                                                                <td className="px-4 py-3 whitespace-nowrap font-mono text-slate-500">
                                                                                    <div className="flex items-center gap-2">
                                                                                        <span className={`text-[10px] w-4 text-center transition-transform ${isExpanded ? 'rotate-90 text-blue-500' : 'text-slate-300'}`}>▶</span>
                                                                                        {teacher.id}
                                                                                    </div>
                                                                                </td>
                                                                                <td className="px-4 py-3 whitespace-nowrap font-bold text-slate-700">{teacher.name}</td>
                                                                                <td className="px-4 py-3 whitespace-nowrap text-slate-500 border-r border-slate-100">{teacher.title}</td>
                                                                                {/* 各分類總分 */}
                                                                                {Object.values(SCORING_CATEGORIES).map(cat => {
                                                                                    const catTotal = getTeacherCategoryTotal(teacher, cat.id);
                                                                                    return (
                                                                                        <td key={cat.id} className="px-3 py-3 whitespace-nowrap text-center">
                                                                                            {catTotal !== 0 ? (
                                                                                                <span className={`font-bold ${catTotal > 0 ? 'text-emerald-600' : 'text-red-500'}`}>
                                                                                                    {catTotal.toFixed(1).replace(/\.0$/, '')}
                                                                                                </span>
                                                                                            ) : (
                                                                                                <span className="text-slate-300 font-medium">0</span>
                                                                                            )}
                                                                                        </td>
                                                                                    );
                                                                                })}
                                                                                <td className="px-4 py-3 whitespace-nowrap text-center font-black text-blue-600 border-l border-slate-100 bg-blue-50/30 text-[15px]">
                                                                                    {teacherGrandTotal.toFixed(1).replace(/\.0$/, '')}
                                                                                </td>
                                                                            </tr>
                                                                            
                                                                            {/* 展開的明細視窗 */}
                                                                            {isExpanded && (
                                                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                                                    <td colSpan={Object.keys(SCORING_CATEGORIES).length + 4} className="p-0">
                                                                                        <div className="p-5 shadow-[inset_0_2px_8px_rgba(0,0,0,0.04)] bg-slate-50">
                                                                                            <h4 className="font-bold text-blue-800 mb-3 border-b border-blue-200/50 pb-2 flex items-center gap-2">
                                                                                                <IconUser className="w-4 h-4" />
                                                                                                {teacher.name} 的詳細加扣分紀錄
                                                                                            </h4>
                                                                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                                                                                                {Object.values(SCORING_CATEGORIES).map(cat => {
                                                                                                    const items = cat.sections.flatMap(s => s.items);
                                                                                                    const hasScore = items.some(item => (teacher.scores?.[item.key] || 0) !== 0);
                                                                                                    
                                                                                                    return (
                                                                                                        <div key={cat.id} className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                                                                                            <div className="font-bold text-slate-700 mb-2 flex items-center gap-1 border-b border-slate-100 pb-1.5 text-sm">
                                                                                                                {cat.icon} {cat.title}
                                                                                                            </div>
                                                                                                            {hasScore ? (
                                                                                                                <div className="space-y-1.5">
                                                                                                                    {items.map(item => {
                                                                                                                        const raw = teacher.scores?.[item.key] || 0;
                                                                                                                        if (raw === 0) return null;
                                                                                                                        const conv = raw * getWeight(item.key);
                                                                                                                        return (
                                                                                                                            <div key={item.key} className="flex justify-between items-center text-sm border-b border-slate-50 pb-1 last:border-0">
                                                                                                                                <span className="text-slate-600 text-xs truncate mr-2" title={item.label}>{item.label}</span>
                                                                                                                                <div className="text-right whitespace-nowrap">
                                                                                                                                    <span className={`font-bold ${conv > 0 ? 'text-blue-600' : 'text-red-500'}`}>{conv.toFixed(1).replace(/\.0$/, '')}</span>
                                                                                                                                    <span className="text-[10px] text-slate-400 ml-1">(原:{raw}{item.unit})</span>
                                                                                                                                </div>
                                                                                                                            </div>
                                                                                                                        )
                                                                                                                    })}
                                                                                                                </div>
                                                                                                            ) : (
                                                                                                                <div className="text-xs text-slate-400 text-center py-4 bg-slate-50/50 rounded">無得分紀錄</div>
                                                                                                            )}
                                                                                                        </div>
                                                                                                    )
                                                                                                })}
                                                                                            </div>
                                                                                        </div>
                                                                                    </td>
                                                                                </tr>
                                                                            )}
                                                                        </Fragment>
                                                                    );
                                                                })}
                                                            </Fragment>
                                                        ))
                                                    )}
                                                </tbody>
                                                {/* 置底智能平均值列 - 加入 sticky bottom-0 */}
                                                {displayedTeachersCount > 0 && !loading && (
                                                    <tfoot className="bg-blue-50/95 backdrop-blur-sm font-bold border-t-[3px] border-blue-200 sticky bottom-0 z-20 outline outline-1 outline-blue-200 shadow-[0_-2px_6px_rgba(0,0,0,0.06)]">
                                                        <tr className="text-blue-900">
                                                            <td colSpan="3" className="px-4 py-4 text-right border-r border-blue-200/50 align-middle">
                                                                {selectedGroup === '全部' ? '全體人員平均總分：' : `【${selectedGroup}】平均總分：`}
                                                            </td>
                                                            {Object.values(SCORING_CATEGORIES).map(cat => (
                                                                <td key={cat.id} className="px-3 py-4 whitespace-nowrap text-center text-[15px]">
                                                                    {getCategoryAverageTotal(cat.id).toFixed(1).replace(/\.0$/, '')}
                                                                </td>
                                                            ))}
                                                            <td className="px-4 py-4 whitespace-nowrap text-center text-lg font-black text-blue-700 border-l border-blue-200/50 bg-blue-100/50">
                                                                {getGrandAverageTotal().toFixed(1).replace(/\.0$/, '')}
                                                            </td>
                                                        </tr>
                                                    </tfoot>
                                                )}
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ===================================================================== */}
                            {/* 視角 A：單人評分 (Single User View) */}
                            {/* ===================================================================== */}
                            {viewMode === 'single' && (
                                <div className="animate-in fade-in duration-300">
                                    {!currentCardNumber && !loading && (
                                        <div className="text-center py-20 text-slate-500">
                                            <IconSearch className="w-16 h-16 mx-auto text-slate-300 mb-4" />
                                            <p className="text-lg">請在上方輸入卡號以查詢，或點擊「批次匯入」建立資料</p>
                                        </div>
                                    )}

                                    {isCreating && (
                                        <div className="bg-white rounded-xl shadow-sm p-6 border border-slate-200 max-w-lg mx-auto mt-10">
                                            <div className="text-center mb-6">
                                                <div className="bg-blue-100 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                                                    <IconUserPlus className="w-6 h-6" />
                                                </div>
                                                <h2 className="text-xl font-bold">新增教職員資料</h2>
                                                <p className="text-slate-500 text-sm mt-1">查無卡號「{currentCardNumber}」，請輸入基本資料建立檔案。</p>
                                            </div>
                                            
                                            <form onSubmit={handleCreateTeacher} className="space-y-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                                                    <input
                                                        type="text"
                                                        required
                                                        value={newName}
                                                        onChange={(e) => setNewName(e.target.value)}
                                                        className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500"
                                                        placeholder="例如：王小明"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">職稱</label>
                                                    <input
                                                        type="text"
                                                        required
                                                        value={newTitle}
                                                        onChange={(e) => setNewTitle(e.target.value)}
                                                        className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500"
                                                        placeholder="例如：主任"
                                                    />
                                                </div>
                                                <button
                                                    type="submit"
                                                    className="w-full bg-blue-600 text-white rounded-lg py-2.5 font-medium hover:bg-blue-700 transition-colors"
                                                >
                                                    確認建立
                                                </button>
                                            </form>
                                        </div>
                                    )}

                                    {teacherData && !isCreating && (
                                        <div className="space-y-6">
                                            {/* 頂部個人資料區塊 */}
                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                                {isEditingProfile ? (
                                                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full">
                                                        <div className="flex items-center gap-4 w-full sm:w-auto">
                                                            <div className="bg-slate-100 p-3 rounded-full hidden sm:block flex-shrink-0">
                                                                <IconUser className="w-8 h-8 text-slate-600" />
                                                            </div>
                                                            <div className="flex flex-col gap-2 w-full sm:w-auto">
                                                                <input
                                                                    type="text"
                                                                    value={editName}
                                                                    onChange={(e) => setEditName(e.target.value)}
                                                                    placeholder="姓名"
                                                                    className="border border-slate-300 rounded-lg px-3 py-1.5 focus:ring-blue-500 focus:border-blue-500 text-lg font-bold w-full sm:w-48"
                                                                />
                                                                <input
                                                                    type="text"
                                                                    value={editTitle}
                                                                    onChange={(e) => setEditTitle(e.target.value)}
                                                                    placeholder="職稱"
                                                                    className="border border-slate-300 rounded-lg px-3 py-1.5 focus:ring-blue-500 focus:border-blue-500 text-sm w-full sm:w-48"
                                                                />
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2 w-full sm:w-auto sm:ml-auto mt-2 sm:mt-0">
                                                            <button onClick={handleSaveProfile} disabled={loading} className="flex-1 sm:flex-none text-sm bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium transition-colors">確認修改</button>
                                                            <button onClick={() => setIsEditingProfile(false)} disabled={loading} className="flex-1 sm:flex-none text-sm bg-slate-100 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-200 font-medium border border-slate-200 transition-colors">取消</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div className="flex items-center gap-4">
                                                            <div className="bg-slate-100 p-3 rounded-full flex-shrink-0">
                                                                <IconUser className="w-8 h-8 text-slate-600" />
                                                            </div>
                                                            <div>
                                                                <div className="flex items-center gap-2">
                                                                    <h2 className="text-2xl font-bold text-slate-800">{teacherData.name}</h2>
                                                                    <button 
                                                                        onClick={() => {
                                                                            setEditName(teacherData.name);
                                                                            setEditTitle(teacherData.title);
                                                                            setIsEditingProfile(true);
                                                                        }}
                                                                        className="text-slate-400 hover:text-blue-600 transition-colors p-1 rounded-full hover:bg-blue-50"
                                                                        title="修改基本資料"
                                                                    >
                                                                        <IconEdit className="w-4 h-4" />
                                                                    </button>
                                                                </div>
                                                                <div className="flex flex-wrap gap-3 text-sm text-slate-500 mt-1">
                                                                    <span className="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">{teacherData.title}</span>
                                                                    <span className="flex items-center gap-1"><span className="text-slate-400">卡號:</span> {currentCardNumber}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={handleSaveScores}
                                                            disabled={loading}
                                                            className="flex items-center gap-2 bg-emerald-600 text-white px-5 py-2.5 rounded-lg hover:bg-emerald-700 transition-colors font-medium shadow-sm w-full sm:w-auto justify-center"
                                                        >
                                                            <IconSave className="w-4 h-4" />
                                                            儲存所有變更
                                                        </button>
                                                    </>
                                                )}
                                            </div>

                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                                <div className="flex overflow-x-auto border-b border-slate-200 bg-slate-50 hide-scrollbar">
                                                    {Object.values(SCORING_CATEGORIES).map((cat) => (
                                                        <button
                                                            key={cat.id}
                                                            onClick={() => setActiveTab(cat.id)}
                                                            className={`flex items-center gap-2 px-6 py-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${
                                                                activeTab === cat.id
                                                                    ? 'border-blue-600 text-blue-700 bg-white'
                                                                    : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'
                                                            }`}
                                                        >
                                                            {cat.icon}
                                                            {cat.title}
                                                        </button>
                                                    ))}
                                                </div>

                                                <div className="p-6">
                                                    <div className="mb-6 border-b border-slate-100 pb-4">
                                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                            {SCORING_CATEGORIES[activeTab].icon}
                                                            {SCORING_CATEGORIES[activeTab].title} - 評分項目
                                                        </h3>
                                                        <p className="text-sm text-slate-500 mt-1">
                                                            請在對應欄位輸入數值，系統將會自動乘上主管設定的換算權重。
                                                        </p>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                                        {SCORING_CATEGORIES[activeTab].sections.map((section, idx) => (
                                                            <div key={idx} className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                                <h4 className="font-semibold text-slate-700 mb-3 text-sm flex items-center gap-1">
                                                                    <IconChevronRight className="w-4 h-4 text-slate-400" />
                                                                    {section.title}
                                                                </h4>
                                                                <div className="space-y-3">
                                                                    {section.items.map((item) => {
                                                                        const currentVal = teacherData.scores?.[item.key] || 0;
                                                                        const weight = getWeight(item.key);
                                                                        const convertedVal = currentVal * weight;
                                                                        
                                                                        return (
                                                                            <div key={item.key} className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 bg-white p-2.5 rounded border border-slate-200 shadow-sm hover:border-blue-200 transition-colors">
                                                                                <label className="text-sm text-slate-700 flex-grow font-medium leading-tight">
                                                                                    {item.label}
                                                                                </label>
                                                                                <div className="flex items-center justify-end flex-shrink-0 gap-2">
                                                                                    <div className="flex items-center">
                                                                                        <input
                                                                                            type="number"
                                                                                            value={currentVal || ''}
                                                                                            onChange={(e) => handleScoreChange(item.key, e.target.value)}
                                                                                            placeholder="0"
                                                                                            className={`w-16 text-center border rounded-md py-1 px-1 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none ${
                                                                                                currentVal > 0 ? 'text-emerald-600 font-bold border-emerald-200 bg-emerald-50' :
                                                                                                currentVal < 0 ? 'text-red-600 font-bold border-red-200 bg-red-50' :
                                                                                                'text-slate-600 border-slate-300'
                                                                                            }`}
                                                                                        />
                                                                                        <span className="text-xs text-slate-500 ml-1.5 w-6 text-left">{item.unit}</span>
                                                                                    </div>
                                                                                    {/* 動態顯示換算結果 */}
                                                                                    <div className="flex items-center bg-slate-50 border border-slate-100 rounded px-2 py-1 min-w-[90px] justify-end">
                                                                                        <span className="text-[10px] text-slate-400 mr-1.5">×{weight}=</span>
                                                                                        <span className={`text-sm font-bold ${convertedVal > 0 ? 'text-blue-600' : convertedVal < 0 ? 'text-red-500' : 'text-slate-400'}`}>
                                                                                            {convertedVal.toFixed(1).replace(/\.0$/, '')}分
                                                                                        </span>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            if (!window.__reactRoot) {
                window.__reactRoot = ReactDOM.createRoot(document.getElementById('root'));
            }
            window.__reactRoot.render(<App />);
        })();
    </script>
</body>
</html>
