<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托福單字精準複習站</title>
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --danger: #E74C3C;
            --bg: #F0F2F5;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container { width: 90%; max-width: 500px; text-align: center; }

        /* 篩選器樣式 */
        .filter-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #666;
        }

        .tab.active { background: var(--primary); color: white; }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 250px;
            margin-bottom: 20px;
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-learned { background: #e8f5e9; color: var(--success); }
        .status-review { background: #ffebee; color: var(--danger); }

        #word { font-size: 2.5rem; color: var(--primary); margin: 10px 0; }
        #definition { 
            font-size: 1.3rem; margin-top: 20px; padding: 15px;
            background: #f9f9f9; border-radius: 8px; display: none;
        }

        .controls button {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-yes { background: var(--success); color: white; }
        .btn-no { background: var(--danger); color: white; }
        
        .stats { margin-top: 20px; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="filter-tabs">
        <div class="tab active" onclick="setMode('all')">全部 (<span id="count-all">0</span>)</div>
        <div class="tab" onclick="setMode('review')">需複習 (<span id="count-review">0</span>)</div>
        <div class="tab" onclick="setMode('learned')">已學會 (<span id="count-learned">0</span>)</div>
    </div>

    <div class="card">
        <div id="status" class="status-badge">未練習</div>
        <h2 id="word">Loading...</h2>
        <div id="phonetic" style="color:#999"></div>
        <div id="definition"></div>
    </div>

    <div class="controls">
        <button class="btn-main" onclick="showDef()">👁️ 顯示釋義</button>
        <div style="display: flex; gap: 10px;">
            <button class="btn-no" onclick="markWord('review')">❌ 還不熟</button>
            <button class="btn-yes" onclick="markWord('learned')">✅ 記住了</button>
        </div>
    </div>

    <div class="stats">
        提示：切換上方分頁可針對特定群組進行強化複習。
        <br><br>
        <a href="#" onclick="resetAll()" style="color:#ccc">重設所有資料</a>
    </div>
</div>

<script>
    // 原始單字表
    const rawVocabulary = [
        { word: "Advocate", phonetic: "/ˈæd.və.keɪt/", def: "擁護、提倡" },
        { word: "Ambiguous", phonetic: "/æmˈbɪɡ.ju.əs/", def: "含糊不清的" },
        { word: "Corroborate", phonetic: "/kəˈrɒb.ə.reɪt/", def: "證實、確證" },
        { word: "Ephemeral", phonetic: "/ɪˈfem.ər.əl/", def: "短暫的" },
        { word: "Inherent", phonetic: "/ɪnˈhɪə.rənt/", def: "固有的" },
        { word: "Pragmatic", phonetic: "/præɡˈmæt.ɪk/", def: "務實的" }
    ];

    let db = JSON.parse(localStorage.getItem('toefl_db')) || {};
    let currentMode = 'all'; // all, review, learned
    let currentWordObj = null;

    function updateCounts() {
        const vals = Object.values(db);
        document.getElementById('count-all').innerText = rawVocabulary.length;
        document.getElementById('count-review').innerText = vals.filter(v => v === 'review').length;
        document.getElementById('count-learned').innerText = vals.filter(v => v === 'learned').length;
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        nextWord();
    }

    function nextWord() {
        let pool = [];
        if (currentMode === 'all') {
            pool = rawVocabulary;
        } else {
            pool = rawVocabulary.filter(item => db[item.word] === currentMode);
        }

        if (pool.length === 0) {
            document.getElementById('word').innerText = "空空如也";
            document.getElementById('phonetic').innerText = "";
            document.getElementById('definition').innerText = "此分類目前沒有單字";
            document.getElementById('status').innerText = "-";
            return;
        }

        currentWordObj = pool[Math.floor(Math.random() * pool.length)];
        
        document.getElementById('word').innerText = currentWordObj.word;
        document.getElementById('phonetic').innerText = currentWordObj.phonetic;
        document.getElementById('definition').innerText = currentWordObj.def;
        document.getElementById('definition').style.display = 'none';
        
        const status = db[currentWordObj.word];
        const statusEl = document.getElementById('status');
        statusEl.innerText = status === 'learned' ? '✅ 已學會' : (status === 'review' ? '❌ 需複習' : '⚪ 未練習');
        statusEl.className = 'status-badge ' + (status === 'learned' ? 'status-learned' : (status === 'review' ? 'status-review' : ''));
        
        updateCounts();
    }

    function showDef() {
        document.getElementById('definition').style.display = 'block';
    }

    function markWord(status) {
        if (!currentWordObj) return;
        db[currentWordObj.word] = status;
        localStorage.setItem('toefl_db', JSON.stringify(db));
        nextWord();
    }

    function resetAll() {
        if(confirm("確定重設嗎？")) {
            localStorage.removeItem('toefl_db');
            db = {};
            nextWord();
        }
    }

    // 初始化
    nextWord();
</script>

</body>
</html>
